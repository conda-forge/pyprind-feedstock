context:
  version: "2.11.3"

package:
  name: pyprind
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/P/PyPrind/PyPrind-${{ version }}.tar.gz
  sha256: e37dcab6e1a9c8e0a7f0fce65fde7a79e2deda1c75aa015910a49e2137b54cbf

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - psutil >=3.2.0

tests:
  - python:
      imports:
        - pyprind
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/rasbt/pyprind
  summary: A progress bar and a percentage indicator object that let you track the progress of an iterative computation
  description: |
    The PyPrind (Python Progress Indicator) module provides a progress bar
    and a percentage indicator object that let you track the progress of a
    loop structure or other iterative computation.
  license: BSD-3-Clause
  license_file: LICENSE
  documentation: http://pythonhosted.org/PyPrind/
  repository: https://github.com/rasbt/pyprind

extra:
  recipe-maintainers:
    - cmutel
